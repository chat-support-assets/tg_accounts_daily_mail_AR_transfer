version: '3.8'

services:
  topic-logger:
    build: .
    container_name: telegram-topic-logger
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./sessions:/app/sessions:rw
      - ./service-account-key.json:/app/service-account-key.json:ro
      - ./logs:/app/logs
    networks:
      - telegram-network
    environment:
      - PYTHONUNBUFFERED=1
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  geo-controller:
    build: .
    container_name: telegram-geo-controller
    restart: unless-stopped
    command: python new_daily_ar.py
    env_file:
      - .env
    volumes:
      - ./service-account-key.json:/app/service-account-key.json:ro
      - ./sessions:/app/sessions:ro
      - ./logs:/app/logs
      - ./failed_exports:/app/failed_exports
    networks:
      - telegram-network
    depends_on:
      - topic-logger
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  telegram-network:
    driver: bridge