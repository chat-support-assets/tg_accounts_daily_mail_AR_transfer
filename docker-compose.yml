version: '3.8'

services:
  topic-logger:
    build: .
    container_name: telegram-topic-logger
    restart: unless-stopped
    command: python topic_id_logging_bot.py
    env_file:
      - .env
    volumes:
      - ./sessions:/app/sessions
      - ./service-account-key.json:/app/service-account-key.json:ro
      - ./logs:/app/logs
    networks:
      - telegram-network

  geo-controller:
    build: .
    container_name: telegram-geo-controller
    restart: unless-stopped
    command: python new_daily_ar.py
    env_file:
      - .env
    volumes:
      - ./service-account-key.json:/app/service-account-key.json:ro
      - ./sessions:/app/sessions
      - ./logs:/app/logs
      - ./failed_exports:/app/failed_exports
    networks:
      - telegram-network

networks:
  telegram-network:
    driver: bridge
